{% extends "base.html" %}
{% block contenu %}
<h1 class="text-xl font-bold text-quantumBleu mb-6">Mes commandes</h1>
<div class="bg-white rounded-xl shadow overflow-x-auto">
    <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
            <tr><th class="text-left px-4 py-3">Numéro</th><th class="text-left px-4 py-3">Statut</th><th class="text-left px-4 py-3">Étape</th><th class="text-left px-4 py-3">Date</th><th></th></tr>
        </thead>
        <tbody class="divide-y">
            {% for c in commandes %}
            <tr>
                <td class="px-4 py-3 font-medium">{{ c.numero }}</td>
                <td class="px-4 py-3">{{ c.get_statut_display }}</td>
                <td class="px-4 py-3">{{ c.get_etape_courante_display }}</td>
                <td class="px-4 py-3 text-gray-400">{{ c.cree_le|date:"d/m/Y" }}</td>
                <td class="px-4 py-3 text-right"><a href="{% url 'commandes:detail' c.pk %}" class="text-quantumRouge">Détails →</a></td>
            </tr>
            {% empty %}
            <tr><td colspan="5" class="text-center text-gray-400 py-6">Aucune commande pour le moment.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
