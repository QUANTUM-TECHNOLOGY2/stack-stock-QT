{% extends "base.html" %}
{% block contenu %}
<h1 class="text-xl font-bold text-quantumBleu mb-6">{{ titre }}</h1>
<div class="bg-white rounded-xl shadow p-6 max-w-4xl">
    <form method="post" enctype="multipart/form-data" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {% csrf_token %}
        {% for field in form %}
        <div class="{% if field.name == 'description' %}sm:col-span-2{% endif %}">
            <label class="text-sm font-medium block mb-1">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}<p class="text-quantumRouge text-xs">{{ error }}</p>{% endfor %}
        </div>
        {% endfor %}
        <div class="sm:col-span-2 flex justify-end gap-3 mt-4">
            <a href="{% url 'catalog:materiel_liste' %}" class="px-4 py-2 text-sm text-gray-500">Annuler</a>
            <button type="submit" class="bg-quantumRouge text-white font-semibold px-5 py-2.5 rounded-lg hover:bg-quantumRouge/90">
                Enregistrer
            </button>
        </div>
    </form>
</div>
{% endblock %}
