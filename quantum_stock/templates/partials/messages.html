{% if messages %}
<div class="space-y-2 mb-4">
    {% for message in messages %}
    <div class="px-4 py-3 rounded-lg text-sm border
        {% if message.tags == 'success' %} bg-green-50 text-green-700 border-green-200
        {% elif message.tags == 'error' %} bg-red-50 text-quantumRouge border-red-200
        {% else %} bg-blue-50 text-quantumBleu border-blue-200 {% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
