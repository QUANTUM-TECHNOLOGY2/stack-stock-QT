{% extends "base.html" %}
{% block contenu %}
<h1 class="text-xl font-bold text-quantumBleu mb-6">{{ titre }}</h1>
<div class="bg-white rounded-xl shadow p-6 max-w-lg">
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="text-sm font-medium block mb-1">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}<p class="text-quantumRouge text-xs">{{ error }}</p>{% endfor %}
        </div>
        {% endfor %}
        <button type="submit" class="w-full bg-quantumRouge text-white font-semibold py-2.5 rounded-lg">Valider</button>
    </form>
</div>
{% endblock %}
