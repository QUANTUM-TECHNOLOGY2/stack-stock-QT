{% extends "registration/_auth_base.html" %}
{% block carte %}
<h1 class="text-xl font-bold text-quantumBleu mb-4">Nouveau mot de passe</h1>
{% if validlink %}
<form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
        <label class="text-sm font-medium">Nouveau mot de passe</label>
        {{ form.new_password1 }}
    </div>
    <div>
        <label class="text-sm font-medium">Confirmer le mot de passe</label>
        {{ form.new_password2 }}
    </div>
    <button type="submit" class="w-full bg-quantumRouge hover:bg-quantumRouge/90 text-white font-semibold py-2.5 rounded-lg transition">
        Réinitialiser le mot de passe
    </button>
</form>
{% else %}
<p class="text-sm text-quantumRouge">Ce lien de réinitialisation est invalide ou a déjà été utilisé.</p>
{% endif %}
{% endblock %}
