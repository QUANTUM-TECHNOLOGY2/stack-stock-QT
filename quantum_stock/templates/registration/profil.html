{% extends "base.html" %}
{% block contenu %}
<div class="max-w-2xl">
    <h1 class="text-xl font-bold text-quantumBleu mb-6">Mon profil</h1>
    <div class="bg-white rounded-xl shadow p-6">
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="text-sm font-medium block mb-1">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}<p class="text-quantumRouge text-xs">{{ error }}</p>{% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="bg-quantumRouge text-white font-semibold px-5 py-2.5 rounded-lg hover:bg-quantumRouge/90">
                Enregistrer
            </button>
        </form>
    </div>
</div>
{% endblock %}
