{% extends "registration/_auth_base.html" %}
{% block carte %}
<h1 class="text-xl font-bold text-quantumBleu mb-1">Mot de passe oublié</h1>
<p class="text-sm text-gray-500 mb-6">Saisissez votre adresse email, nous vous enverrons un lien de réinitialisation.</p>
<form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.email }}
    <button type="submit" class="w-full bg-quantumRouge hover:bg-quantumRouge/90 text-white font-semibold py-2.5 rounded-lg transition">
        Envoyer le lien
    </button>
</form>
<p class="text-sm text-center text-gray-500 mt-6">
    <a href="{% url 'accounts:login' %}" class="text-quantumBleu">Retour à la connexion</a>
</p>
{% endblock %}
