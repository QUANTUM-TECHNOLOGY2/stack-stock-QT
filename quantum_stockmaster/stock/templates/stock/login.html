<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4 font-sans">
    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-200 w-full max-w-md">
        <div class="flex flex-col items-center gap-1 mb-6">
            <h1 class="text-2xl font-black text-[#293462]">QUANTUM TECHNOLOGY</h1>
            <p class="text-xs text-gray-400">Authentification de sécurité requise</p>
        </div>
        
        {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                    <div class="p-3 text-xs font-semibold rounded bg-rose-50 text-[#D61C4E] border border-rose-200">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-600">Adresse Email</label>
                <input type="email" name="email" required class="w-full p-2.5 rounded-lg border border-gray-300 bg-transparent focus:ring-2 focus:ring-[#293462] outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-600">Mot de passe</label>
                <input type="password" name="password" required class="w-full p-2.5 rounded-lg border border-gray-300 bg-transparent focus:ring-2 focus:ring-[#293462] outline-none">
            </div>
            <button type="submit" class="w-full bg-[#293462] hover:bg-[#1f274a] text-white font-medium py-2.5 rounded-lg transition shadow-sm">
                Se connecter
            </button>
            <p class="text-center text-xs text-gray-500 mt-2">
                Pas encore membre ? <a href="{% url 'register' %}" class="text-[#D61C4E] underline font-medium">Créer un compte</a>
            </p>
        </form>
    </div>
</body>
</html>
